repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --config pyproject.toml
        language: system
        pass_filenames: true
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --config pyproject.toml
        language: system
        pass_filenames: true
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy --config-file pyproject.toml
        language: system
        pass_filenames: true
        types: [python]
        exclude: ^(tests/|examples/)
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.10.1
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages: [pre-push]
